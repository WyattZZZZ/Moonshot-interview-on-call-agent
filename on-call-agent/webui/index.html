<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>On-call Agent</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">On-call Agent</p>
          <h1>SOP 检索与值班问答</h1>
        </div>
        <nav class="version-tabs" aria-label="Agent 版本">
          <button class="version-tab active" type="button" data-view="v1" aria-current="page">v1</button>
          <button class="version-tab" type="button" data-view="v2">v2</button>
          <button class="version-tab" type="button" data-view="v3">v3</button>
        </nav>
      </header>

      <main>
        <section class="control-panel" aria-labelledby="modeHeading">
          <div class="panel-heading">
            <div>
              <h2 id="modeHeading">v1 关键词检索</h2>
              <p id="modeCopy">上传 SOP HTML，然后使用关键词检索接口查询。</p>
            </div>
          </div>
        </section>

        <section id="searchView" class="view-stack">
          <section class="work-panel" aria-labelledby="uploadHeading">
            <div class="section-heading">
              <h2 id="uploadHeading">上传 HTML</h2>
              <span id="uploadEndpoint" class="endpoint-badge">POST /v1/documents</span>
            </div>
            <form id="uploadForm" class="upload-form">
              <div class="field-grid">
                <label>
                  <span>文档 ID</span>
                  <input id="docIdInput" name="docId" type="text" placeholder="sop-011" autocomplete="off">
                </label>
                <label>
                  <span>HTML 文件</span>
                  <input id="htmlFileInput" name="htmlFile" type="file" accept=".html,.htm,text/html">
                </label>
              </div>
              <label>
                <span>HTML 内容</span>
                <textarea id="htmlTextInput" name="htmlText" rows="9" placeholder="在这里粘贴 HTML，或选择上方文件。"></textarea>
              </label>
              <label class="checkbox-row">
                <input id="replaceInput" name="replace" type="checkbox">
                <span>如果文档 ID 已存在则覆盖</span>
              </label>
              <div class="action-row">
                <button type="submit">上传</button>
                <button id="clearUpload" class="ghost-button" type="button">清空</button>
                <span id="uploadStatus" class="inline-status">尚未上传</span>
              </div>
            </form>
          </section>

          <section class="work-panel" aria-labelledby="searchHeading">
            <div class="section-heading">
              <h2 id="searchHeading">搜索</h2>
              <span id="searchEndpoint" class="endpoint-badge">GET /v1/search</span>
            </div>
            <form id="searchForm" class="search-form">
              <label class="visually-hidden" for="queryInput">搜索问题</label>
              <input id="queryInput" name="q" type="search" placeholder="按服务、症状、告警或 SOP 搜索" autocomplete="off">
              <button type="submit">搜索</button>
            </form>
          </section>

          <section class="results-section" aria-live="polite" aria-busy="false">
            <div class="results-header">
              <h2>结果</h2>
              <span id="resultMeta">尚未搜索</span>
            </div>
            <div id="statusMessage" class="status-message">输入问题后搜索 v1 后端。</div>
            <ol id="resultsList" class="results-list"></ol>
          </section>
        </section>

        <section id="chatView" class="view-stack hidden">
          <section class="work-panel chat-panel" aria-labelledby="chatHeading">
            <div class="section-heading">
              <h2 id="chatHeading">Agent 聊天</h2>
              <span class="endpoint-badge">POST /v3/chat/session + WebSocket</span>
            </div>
            <div id="chatMessages" class="chat-messages" aria-live="polite">
              <div class="chat-empty">输入值班问题后，可以实时查看检索、思考和工具调用。</div>
            </div>
            <div class="weight-control" aria-labelledby="weightLabel">
              <div class="weight-header">
                <label id="weightLabel" for="lexicalWeightInput">评分权重</label>
                <span id="weightValue">词频 50% / 语义 50%</span>
              </div>
              <input id="lexicalWeightInput" type="range" min="0" max="100" step="5" value="50">
            </div>
            <form id="chatForm" class="chat-form">
              <label class="visually-hidden" for="chatInput">消息</label>
              <textarea id="chatInput" rows="3" placeholder="数据库主从延迟超过30秒怎么处理？"></textarea>
              <button type="submit">发送</button>
            </form>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
